<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <nav>
    <h1>Cadastro</h1>
  </nav>
  <main>
    <form onsubmit="event.preventDefault(); cadastrarUsuario();">
      <input type="text" id="nomeCadastro" placeholder="Usuário" required><br>
      <input type="password" id="senhaCadastro" placeholder="Senha" required><br>
      <input type="password" id="confirmarSenha" placeholder="Confirmar Senha" required><br>
      <input type="submit" class="btn-principal" value="Cadastrar">
    </form>
    <p id="mensagem"></p>
    <p><a href="login.html">Já tem conta? Faça login</a> | <a href="index.html">Início</a></p>
  </main>
</body>
</html>
