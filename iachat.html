<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(45deg, #85c1e9, #3498db);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h2 {
            margin: 0;
            color: white;
        }

        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .user .message-content {
            background-color: #3498db;
            color: white;
            border-bottom-right-radius: 0;
        }

        .bot .message-content {
            background-color: #ecf0f1;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .chat-input-area {
            padding: 20px;
            background-color: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        #mensagemInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Arial', sans-serif;
        }

        #mensagemInput:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .btn-enviar {
            padding: 12px 25px;
            background: linear-gradient(45deg, #85c1e9, #3498db);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-enviar:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .btn-enviar:active {
            transform: scale(0.98);
        }

        .btn-voltar {
            margin: 20px auto;
            display: block;
            padding: 12px 25px;
            background: linear-gradient(45deg, #85c1e9, #3498db);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-voltar:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .welcome-message {
            text-align: center;
            color: #666;
            font-style: italic;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #3498db;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.7;
            }
            40% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>EV AI</h2>
            <p id="userGreeting" style="margin: 5px 0 0 0;">Bem-vindo!</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                Olá! Sou uma IA simples. Faça perguntas sobre tecnologia, clima, curiosidades e muito mais!
            </div>
        </div>

        <div class="chat-input-area">
            <input 
                type="text" 
                id="mensagemInput" 
                placeholder="Escreva sua mensagem..." 
                autocomplete="off"
            >
            <button class="btn-enviar" onclick="enviarMensagem()">Enviar</button>
        </div>
    </div>

    <button class="btn-voltar" onclick="DeslogarEVoltar()">Voltar</button>

    <script src="script.js"></script>
    <script src="ia.js"></script>
</body>
</html>
